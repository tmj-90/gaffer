name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.os }} / node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [22, 24]

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Real audit gate: fails on any HIGH/CRITICAL advisory NOT documented in
      # .github/audit-allowlist.txt. Accepted advisories are listed + justified
      # there; everything new fails the build. (Replaces the old `|| true` no-op.)
      - name: Dependency audit
        shell: bash
        run: |
          echo "::group::pnpm audit"
          pnpm audit --audit-level=high || true
          echo "::endgroup::"
          .github/scripts/audit-gate.sh

      - name: Verify better-sqlite3 native binding loads
        # Both packages depend on better-sqlite3 (now unified on ^12). Resolve the
        # native module from EACH package — pnpm does not hoist it to the workspace
        # root, so a root require() would fail, and a binding can build for one
        # package's install context but not another. Check both.
        shell: bash
        run: |
          for pkg in dispatch memory; do
            ( cd "packages/$pkg" && node -e "const D=require('better-sqlite3');const db=new D(':memory:');db.exec('create table t(x)');db.prepare('insert into t values (1)').run();if(db.prepare('select count(*) c from t').get().c!==1)throw new Error('better-sqlite3 binding check failed');db.close();console.log('$pkg: better-sqlite3 native binding OK')" )
          done

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      # Build first: cross-package imports (e.g. crew's tests import the `dispatch`
      # workspace package) resolve against each package's built dist/*.d.ts, so the
      # typecheck steps must run after the build.
      - name: Build
        run: pnpm -r build

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Typecheck (tests)
        run: pnpm -r typecheck:test

      - name: Test (packages)
        run: pnpm -r test

      # Coverage gate: re-runs the suites with v8 coverage and enforces the
      # per-package floor (thresholds live in each packages/*/vitest.config.ts).
      # A drop below the floor fails the job. Runs after the plain test step so a
      # coverage-provider hiccup is distinguishable from a real test failure.
      - name: Coverage (floor gate)
        run: pnpm -r test:coverage

      # Each runner test runs under a per-test wall-clock cap (perl alarm — portable
      # across the ubuntu + macOS runners; GNU `timeout` isn't on macOS). A hung test
      # is killed and reported as a failure (exit 124) instead of stalling the job.
      - name: Runner tests (node)
        shell: bash
        run: |
          rc=0
          for t in runner/test/*.test.mjs; do
            echo "::group::$t"
            perl -e 'alarm shift; exec @ARGV' 180 node "$t" || { c=$?; rc=1; case $c in 124|142) echo "::error::$t TIMED OUT (180s, exit $c)";; esac; }
            echo "::endgroup::"
          done
          exit $rc

      - name: Runner tests (bash)
        shell: bash
        run: |
          rc=0
          for t in runner/test/*.test.sh; do
            echo "::group::$t"
            out="$(perl -e 'alarm shift; exec @ARGV' 120 bash "$t" 2>&1)"; c=$?
            echo "$out"
            echo "::endgroup::"
            if [ "$c" -ne 0 ]; then
              rc=1
              case $c in
                124|142) echo "::error::$t TIMED OUT (120s, exit $c)";;
                *) tail="$(printf '%s\n' "$out" | grep -iE 'fail|✗|✘|not ok|error|expected|assert' | head -6 | tr '\n' '|')"
                   echo "::error::$t FAILED (exit $c) :: ${tail:-see grouped log}";;
              esac
            fi
          done
          exit $rc
