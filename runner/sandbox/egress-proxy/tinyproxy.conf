# Gaffer egress-allowlist proxy (Mode 2 / docker provider).
# Default-DENY: the delivery container has NO direct route to the internet (it sits on
# an --internal docker network); its ONLY path out is this proxy, which forwards a
# request ONLY when the destination host matches /etc/tinyproxy/filter. Everything else
# is refused — so `read host data -> POST it out` fails at the network layer, not a
# string check.

User tinyproxy
Group tinyproxy
Port 8888
Timeout 600
LogLevel Info
MaxClients 100

# Which CLIENTS may use the proxy. The delivery container is the only thing on the
# internal network, so allow the private ranges the docker network hands out.
Allow 127.0.0.1
Allow 10.0.0.0/8
Allow 172.16.0.0/12
Allow 192.168.0.0/16

# Destination allowlist (default-deny). Extended regex, case-insensitive, matched
# against the request host. See ./filter.
FilterDefaultDeny Yes
Filter "/etc/tinyproxy/filter"
FilterExtended On
FilterCaseSensitive Off

# HTTPS CONNECT is host-filtered too; only these ports may be tunnelled.
ConnectPort 443
ConnectPort 563
